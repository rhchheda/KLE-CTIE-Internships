var EXEC_URL = '<?= EXEC_URL ?>';
var PAGES    = <?!= PAGES_JSON ?>;
function backToAdmin() { window.top.location.href = EXEC_URL + '?page=Admin'; }

function nav(key) {
  var url = PAGES[key] || PAGES['Home'];
  window.top.location.href = url;
}
function navPage(key) { nav(key); }
function navSector(s) {
  window.top.location.href = (PAGES['Browse'] || EXEC_URL) + '&sector=' + encodeURIComponent(s);
}
var MAX_RS   = 2;

// Auto-lookup if appId in URL
(function() {
  var v = document.getElementById('appIdInput').value.trim();
  if (v) lookupApp();
})();

function lookupApp() {
  var id = document.getElementById('appIdInput').value.trim().toUpperCase();
  if (!id) { toast('err','Enter an Application ID'); return; }

  document.getElementById('notFound').classList.remove('show');
  document.getElementById('trackCard').style.display = 'none';
  document.getElementById('appIdInput').disabled = true;

  google.script.run
    .withSuccessHandler(function(r) {
      document.getElementById('appIdInput').disabled = false;
      if (!r || !r.ok) {
        document.getElementById('notFound').classList.add('show');
        return;
      }
      renderTrack(r);
    })
    .withFailureHandler(function(e) {
      document.getElementById('appIdInput').disabled = false;
      toast('err','Error: '+e.message);
    })
    .getApplicationStatus(id);
}

function renderTrack(d) {
  document.getElementById('tStartup').textContent = d.startupName||'--';
  document.getElementById('tRole').textContent    = d.roleTitle  ||'--';
  document.getElementById('tAppId').textContent   = d.appId      ||'--';

  var rCount = parseInt(d.rescheduleCount||0);
  var status = d.status||'Applied';

  // Build stage list
  var stages = [
    {
      key:   'applied',
      title: 'Application submitted',
      done:  true,
      date:  d.appliedAt,
      detail:'Your application was received. Confirmation sent to both your emails.'
    },
    {
      key:    'review',
      title:  'Startup reviewing',
      done:   statusGte(status,'Shortlisted'),
      active: status==='Applied',
      warn:   false,
      detail: statusGte(status,'Shortlisted')
        ? 'You were shortlisted on '+d.shortlistedAt
        : 'The startup is reviewing applications. SLA: 7 working days.'
    },
    {
      key:    'interview',
      title:  'Interview scheduling',
      done:   statusGte(status,'Interview Scheduled'),
      active: status==='Shortlisted',
      detail: d.interviewDate
        ? 'Interview on '+fmtDateNice(d.interviewDate)+' at '+fmtTimeNice(d.interviewTime)+' IST'
        : status==='Shortlisted' ? 'Startup is setting up interview slots.' : ''
    },
    {
      key:    'outcome',
      title:  'Interview & outcome',
      done:   statusGte(status,'Offer Pending OTP') || status==='Not Selected',
      active: status==='Interview Scheduled' || status==='Interview Held -- Outcome Pending',
      warn:   status==='Interview Held -- Outcome Pending',
      detail: status==='Interview Held -- Outcome Pending'
        ? 'Interview done. Awaiting startup decision (SLA: 48 hours).'
        : statusGte(status,'Offer Pending OTP') ? 'You have been selected!'
        : status==='Not Selected' ? 'Startup has reviewed and sent their decision.'
        : ''
    },
    {
      key:    'confirm',
      title:  'OTP confirmation',
      done:   status==='Selected' || status==='Completed',
      active: status==='Offer Pending OTP',
      detail: status==='Offer Pending OTP'
        ? 'Check your institute email for the OTP to confirm acceptance.'
        : status==='Selected'||status==='Completed' ? 'Confirmed on '+d.confirmedAt : ''
    },
    {
      key:    'intern',
      title:  'Active internship',
      done:   status==='Completed',
      active: status==='Selected',
      detail: status==='Selected' ? 'Internship in progress. '+(d.internStart||'')
        : status==='Completed' ? 'Completed on '+d.internEnd : ''
    },
    {
      key:    'cert',
      title:  'Completion & certificate',
      done:   status==='Completed',
      active: false,
      detail: status==='Completed'
        ? 'Your certificate is ready to view and print below.' : 'After successful completion.'
    }
  ];

  // Closed states
  if (status.indexOf('Closed')>=0 || status==='Not Selected') {
    stages = stages.slice(0, stages.findIndex(function(s){return !s.done;})+1);
    stages.push({
      key:'closed', title: status, done:false, active:false,
      detail: status==='Not Selected'
        ? 'You are welcome to apply to other open roles.'
        : 'Application closed. You may apply to other roles.',
      isDanger: true
    });
  }

  document.getElementById('stagesWrap').innerHTML = stages.map(function(s, i) {
    var circleClass = s.isDanger ? 'sc-danger'
      : s.warn ? 'sc-warning'
      : s.done ? 'sc-done'
      : s.active ? 'sc-active' : 'sc-pending';
    var icon = s.done ? '&#10003;' : s.isDanger ? '&#10005;' : String(i+1);

    var interviewBox = '';
    if (s.key==='interview' && d.interviewDate) {
      interviewBox = '<div class="interview-box">'
        +'<div class="ib-row"><span class="ib-label">Date</span><span class="ib-val">'+esc(fmtDateNice(d.interviewDate))+'</span></div>'
        +'<div class="ib-row"><span class="ib-label">Time</span><span class="ib-val">'+esc(fmtTimeNice(d.interviewTime))+' IST</span></div>'
        +'<div class="ib-row"><span class="ib-label">Mode</span><span class="ib-val">'+esc(d.interviewMode||'Online')+'</span></div>'
        +(d.meetLink?interviewLinkRow(d.interviewMode, d.meetLink):'')
        +'</div>';
    }

    var rsMeter = '';
    if (rCount>0 && (s.key==='interview'||s.key==='outcome')) {
      var dots = '';
      for(var j=0;j<MAX_RS;j++) dots+='<div class="rm-dot '+(j<rCount?'rm-used':'rm-free')+'"></div>';
      rsMeter = '<div class="reschedule-meter">'
        +'<span class="rm-label">Reschedules used</span>'
        +'<div class="rm-dots">'+dots+'</div>'
        +'<span style="font-size:11px;color:'+(rCount>=MAX_RS?'#C62828':'#888')+'">'+rCount+'/'+MAX_RS
        +(rCount>=MAX_RS?' -- limit reached':'')+'</span>'
        +'</div>';
    }

    return '<div class="stage-row">'
      +'<div class="stage-circle '+circleClass+'">'+icon+'</div>'
      +'<div class="stage-body">'
      +'<div class="stage-title'+(s.active||s.done?'':' pending')+'">'+esc(s.title)+'</div>'
      +(s.date?'<div class="stage-meta">'+esc(s.date)+'</div>':'')
      +(s.detail?'<div class="stage-detail">'+esc(s.detail)+'</div>':'')
      +(s.warn?'<div class="stage-warn">&#9888; Awaiting startup action</div>':'')
      +interviewBox+rsMeter
      +'</div></div>';
  }).join('');

  // CTA area
  var cta = '';
  if (status==='Offer Pending OTP') {
    cta = '<div class="cta-box">'
      +'<p>Check your institute email for the 6-digit OTP. Click below to enter it and confirm your internship.</p>'
      +'<a href="'+EXEC_URL+'?page=OTPVerify&appId='+esc(d.appId)+'" target="_top">Confirm Acceptance with OTP &#8594;</a>'
      +'</div>';
  } else if (status==='Completed') {
    cta = '<div class="cta-box">'
      +'<p>Your internship is complete. View, print, or save your certificate as a PDF.</p>'
      +'<a href="javascript:void(0)" onclick="viewCertificate()">View / Print Certificate &#8594;</a>'
      +'</div>';
  } else if (status==='Applied'||status==='Shortlisted'||status==='Interview Scheduled') {
    cta = '<div style="text-align:center;font-size:12px;color:#888;padding:8px">'
      +'Questions? Contact <span>ctie [at] kletech.ac.in</span>'
      +'</div>';
  }
  document.getElementById('ctaArea').innerHTML = cta;
  document.getElementById('trackCard').style.display = 'block';
  renderResumeCard(d);
}

var CURRENT_APP_ID = '';
function renderResumeCard(d) {
  CURRENT_APP_ID = d.appId || '';
  var card = document.getElementById('resumeCard');
  var body = document.getElementById('resumeContent');
  card.style.display = 'block';

  var viewLink = d.resumeUrl
    ? '<a class="resume-view" href="' + esc(d.resumeUrl) + '" target="_blank">View current resume &#8594;</a>'
    : '<span class="resume-meta">No resume on file yet.</span>';
  var updatedNote = d.resumeUpdatedAt
    ? '<div class="resume-meta" style="margin-top:6px">Last updated: ' + esc(d.resumeUpdatedAt) + '</div>' : '';

  var uploadRow = d.canUpdateResume
    ? '<div style="margin-top:10px">'
      + '<input type="file" id="resumeReupload" accept=".pdf,.doc,.docx" style="display:none" onchange="handleResumeReupload(this)">'
      + '<button class="resume-upload-btn" id="resumeReuploadBtn" type="button" '
      + 'onclick="document.getElementById(\'resumeReupload\').click()">&#8593; Upload newer resume</button>'
      + '<span class="resume-meta" id="resumeReuploadStatus" style="margin-left:8px"></span>'
      + '</div>'
    : '<div class="resume-meta" style="margin-top:8px">Resume updates are no longer accepted at this stage.</div>';

  body.innerHTML = '<div class="resume-row">' + viewLink + '</div>' + updatedNote + uploadRow;
}

function handleResumeReupload(input) {
  var file = input.files[0];
  if (!file) return;
  if (file.size > 5*1024*1024) { toast('err','File too large. Maximum 5MB.'); return; }
  var allowed = ['application/pdf','application/msword',
    'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
  if (allowed.indexOf(file.type)<0) { toast('err','Only PDF, DOC, or DOCX files accepted'); return; }

  var btn    = document.getElementById('resumeReuploadBtn');
  var status = document.getElementById('resumeReuploadStatus');
  btn.disabled = true;
  status.textContent = 'Uploading...';

  var reader = new FileReader();
  reader.onload = function(e) {
    var b64 = e.target.result.split(',')[1];
    google.script.run
      .withSuccessHandler(function(r) {
        btn.disabled = false;
        if (r && r.ok) {
          status.textContent = '';
          toast('ok', r.msg || 'Resume updated.');
          lookupApp();
        } else {
          status.textContent = '';
          toast('err', (r && r.msg) || 'Upload failed. Try again.');
        }
      })
      .withFailureHandler(function(e) {
        btn.disabled = false;
        status.textContent = '';
        toast('err', 'Error: ' + e.message);
      })
      .updateResume(CURRENT_APP_ID, b64, file.name, file.type);
  };
  reader.readAsDataURL(file);
}

function statusGte(current, threshold) {
  var order = ['Applied','Shortlisted','Interview Scheduled','Interview Held -- Outcome Pending',
    'Offer Pending OTP','Selected','Completed'];
  return order.indexOf(current) >= order.indexOf(threshold);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// Server sends interview date/time as plain "yyyy-MM-dd" / "HH:mm" (IST) --
// these render that as "17 Jul 2026" / "10:00 AM" for display.
function fmtDateNice(iso) {
  if (!iso) return '';
  var p = String(iso).split('-');
  if (p.length !== 3) return iso;
  var d = new Date(parseInt(p[0],10), parseInt(p[1],10)-1, parseInt(p[2],10));
  if (isNaN(d.getTime())) return iso;
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
}
function fmtTimeNice(hhmm) {
  if (!hhmm) return '';
  var p = String(hhmm).split(':');
  if (p.length < 2) return hhmm;
  var h = parseInt(p[0],10), m = p[1];
  if (isNaN(h)) return hhmm;
  var ampm = h >= 12 ? 'PM' : 'AM';
  var h12  = h % 12; if (h12 === 0) h12 = 12;
  return h12+':'+m+' '+ampm;
}
// The interview's one free-text detail field means something different per
// mode -- a clickable Meet link, a venue to show up at, or a callback
// number -- so render it accordingly instead of always as "Join meeting".
function interviewLinkRow(mode, value) {
  if (mode==='In-person') return '<div class="ib-row"><span class="ib-label">Venue</span><span class="ib-val">'+esc(value)+'</span></div>';
  if (mode==='Phone') return '<div class="ib-row"><span class="ib-label">Callback Number</span><span class="ib-val">'+esc(value)+'</span></div>';
  return '<div class="ib-row"><span class="ib-label">Meet</span><a class="ib-link" href="'+esc(value)+'" target="_blank">Join meeting</a></div>';
}
function viewCertificate() {
  if (!CURRENT_APP_ID) { toast('err','Application ID not found'); return; }
  // Open the tab synchronously (in direct response to the click) so browsers
  // don't treat it as an unsolicited popup once the async response arrives.
  var certWin = window.open('', '_blank');
  google.script.run
    .withSuccessHandler(function(r){
      if (r && r.ok && r.html) { certWin.document.open(); certWin.document.write(r.html); certWin.document.close(); }
      else { if (certWin) certWin.close(); toast('err', r ? r.msg : 'Certificate not available'); }
    })
    .withFailureHandler(function(e){ if (certWin) certWin.close(); toast('err', e.message); })
    .getCertificate(CURRENT_APP_ID);
}
function toast(type,msg){
  var t=document.getElementById('toast');
  t.className='toast toast-'+(type==='ok'?'ok':type==='err'?'err':'info')+' show';
  t.textContent=msg;clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},4000);
}
